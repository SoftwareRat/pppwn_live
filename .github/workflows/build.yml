name: Build PPPwnLive

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

env:
  BUILDROOT_VERSION: 2024.02.9

jobs:
  build:
    name: Build PPPwnLive
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64]

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libncurses5-dev \
          gcc-multilib \
          wget \
          unzip \
          bc \
          rsync \
          file \
          perl \
          cpio \
          gzip \
          bzip2 \
          patch \
          tar \
          7zip \
          findutils

    - name: Set script permissions
      run: |
        chmod +x board/pppwn/post-build.sh

    - name: Download Buildroot
      run: |
        BUILDROOT_TAR="buildroot-${BUILDROOT_VERSION}.tar.gz"
        wget "https://buildroot.org/downloads/${BUILDROOT_TAR}"
        wget "https://buildroot.org/downloads/${BUILDROOT_TAR}.sign"
        mkdir -p ~/.gnupg
        gpg --batch --keyserver keyserver.ubuntu.com --recv-keys AB07D806D2CE741FB886EE50B025BA8B59C36319
        gpg --batch --decrypt --output ${BUILDROOT_TAR}.txt ${BUILDROOT_TAR}.sign
        awk '$1 == "SHA1:" && $2 ~ /^[0-9a-f]+$/ && $3 == "'"${BUILDROOT_TAR}"'" { print $2, "*'"${BUILDROOT_TAR}"'" }' ${BUILDROOT_TAR}.txt > ${BUILDROOT_TAR}.sha1
        sha1sum -c ${BUILDROOT_TAR}.sha1
        tar xf "${BUILDROOT_TAR}"
        mv "buildroot-${BUILDROOT_VERSION}" buildroot

    - name: Configure and Build
      run: |
        cd buildroot || exit 1
        make BR2_EXTERNAL=.. pppwn_${{ matrix.arch }}_defconfig
        make -j$(nproc)

    - name: Prepare artifacts
      run: |
        mkdir -p artifacts
        cp buildroot/output/images/rootfs.iso9660 artifacts/pppwn-live-${{ matrix.arch }}.iso
        sha256sum artifacts/* > artifacts/SHA256SUMS

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pppwn-live-${{ matrix.arch }}
        path: artifacts/
        retention-days: 30