name: Build PPPwn Live ISO

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential wget xorriso isolinux syslinux-utils \
          libelf-dev bc flex bison libssl-dev dwarves zstd curl jq 7zip unzip
    
    - name: Make scripts executable
      run: |
        chmod +x build_pppwn_iso.sh
    
    - name: Build ISO
      env:
        FORCE_UNSAFE_CONFIGURE: 1
      run: ./build_pppwn_iso.sh
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: pppwn-live-output
        path: pppwn_buildroot/buildroot-*/output/
        if-no-files-found: error
        
    - name: Create Dev Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
      uses: softprops/action-gh-release@v1
      with:
        files: pppwn_buildroot/buildroot-*/output/images/rootfs.iso9660
        name: PPPwn Live (Development Build)
        tag_name: dev-v${{ github.run_number }}
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Create Stable Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: pppwn_buildroot/buildroot-*/output/images/rootfs.iso9660
        name: PPPwn Live
        tag_name: v${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 