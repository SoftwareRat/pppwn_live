name: Build PPPwnLive

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

env:
  BUILDROOT_VERSION: 2024.02.9

jobs:
  build:
    name: Build PPPwnLive
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libncurses5-dev \
          gcc-multilib \
          wget \
          unzip \
          bc \
          rsync \
          file \
          perl \
          cpio \
          gzip \
          bzip2 \
          patch \
          tar \
          findutils

    - name: Download Buildroot
      run: |
        BUILDROOT_TAR="buildroot-${BUILDROOT_VERSION}.tar.gz"
        wget "https://buildroot.org/downloads/${BUILDROOT_TAR}"
        wget "https://buildroot.org/downloads/${BUILDROOT_TAR}.sign"
        gpg --verify "${BUILDROOT_TAR}.sign" "${BUILDROOT_TAR}" || exit 1
        tar xf "${BUILDROOT_TAR}"
        mv "buildroot-${BUILDROOT_VERSION}" buildroot

    - name: Configure and Build
      run: |
        cd buildroot || exit 1
        make BR2_EXTERNAL=../ "pppwn_${{ matrix.arch }}_defconfig"
        make -j$(nproc) || exit 1

    - name: Prepare artifacts
      run: |
        mkdir -p artifacts
        cp buildroot/output/images/rootfs.iso9660 artifacts/pppwn-live-${{ matrix.arch }}.iso
        sha256sum artifacts/* > artifacts/SHA256SUMS

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pppwn-live-${{ matrix.arch }}
        path: artifacts/
        retention-days: 30