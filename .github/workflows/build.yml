name: Build PPPwnLive

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

env:
  BUILDROOT_VERSION: 2024.02.9

jobs:
  build:
    name: Build PPPwnLive
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64]

    steps:
    - uses: actions/checkout@v4
      with:
        path: pppwn_live

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libncurses5-dev \
          gcc-multilib \
          wget \
          unzip \
          bc \
          rsync \
          file \
          perl \
          cpio \
          gzip \
          bzip2 \
          patch \
          tar \
          findutils \
          curl \
          jq \
          7zip

    - name: Setup workspace
      run: |
        pwd
        ls -la
        cd pppwn_live
        BUILDROOT_TAR="buildroot-${BUILDROOT_VERSION}.tar.gz"
        wget "https://buildroot.org/downloads/${BUILDROOT_TAR}"
        wget "https://buildroot.org/downloads/${BUILDROOT_TAR}.sign"
        mkdir -p ~/.gnupg
        gpg --batch --keyserver keyserver.ubuntu.com --recv-keys AB07D806D2CE741FB886EE50B025BA8B59C36319
        gpg --batch --decrypt --output ${BUILDROOT_TAR}.txt ${BUILDROOT_TAR}.sign
        awk '$1 == "SHA1:" && $2 ~ /^[0-9a-f]+$/ && $3 == "'"${BUILDROOT_TAR}"'" { print $2, "*'"${BUILDROOT_TAR}"'" }' ${BUILDROOT_TAR}.txt > ${BUILDROOT_TAR}.sha1
        sha1sum -c ${BUILDROOT_TAR}.sha1
        tar xf "${BUILDROOT_TAR}"
        mv "buildroot-${BUILDROOT_VERSION}" buildroot
        ls -la
        echo "Workspace contents:"
        find . -maxdepth 2 -type d

    - name: Verify config file
      run: |
        cd pppwn_live
        echo "Config file contents:"
        ls -la configs/
        cat configs/pppwn_${{ matrix.arch }}_defconfig | head -n 10
        echo "Package Config.in contents:"
        cat package/pppwn/Config.in
        echo "BR2_EXTERNAL path:"
        echo $PWD

    - name: Configure and Build
      run: |
        cd pppwn_live/buildroot
        echo "Current directory: $PWD"
        echo "Parent directory contents:"
        ls -la ${GITHUB_WORKSPACE}
        make BR2_EXTERNAL=${GITHUB_WORKSPACE}/pppwn_live pppwn_${{ matrix.arch }}_defconfig
        if [ $? -ne 0 ]; then
          echo "Error: Failed to apply defconfig"
          exit 1
        fi
        make -j$(nproc)
        if [ $? -ne 0 ]; then
          echo "Error: Build failed"
          cat output/build/build-time.log || true
          exit 1
        fi

    - name: Prepare artifacts
      if: success()
      run: |
        cd pppwn_live
        mkdir -p artifacts
        cp buildroot/output/images/rootfs.iso9660 artifacts/pppwn-live-${{ matrix.arch }}.iso || echo "ISO file not found"
        ls -la buildroot/output/images/
        sha256sum artifacts/* > artifacts/SHA256SUMS || echo "No artifacts to checksum"

    - name: Upload artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: pppwn-live-${{ matrix.arch }}
        path: pppwn_live/artifacts/
        retention-days: 30